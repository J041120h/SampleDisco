multiomics_celltype_col: "cell_type"
multiomics_modality_col: "modality"

multiomics_verbose: true
multiomics_use_gpu: true
multiomics_random_state: 42

multiomics_ensembl_release: 98
multiomics_species: "homo_sapiens"
multiomics_use_highly_variable: true
multiomics_n_top_genes: 2000
multiomics_n_pca_comps: 50
multiomics_n_lsi_comps: 50
multiomics_lsi_n_iter: 15
multiomics_gtf_by: "gene_name"
multiomics_flavor: "seurat_v3"
multiomics_generate_umap: false
multiomics_compression: "gzip"

multiomics_consistency_threshold: 0.05
multiomics_treat_sample_as_batch: false  # GLUE preserves per-sample variance (V2 default)

# --- Sample-removed cluster embedding (X_glue from scGLUE is the CMD/sample-preserved emb) ---
# By default, one Harmony pass on X_glue removes per-sample variance to
# produce X_glue_harmony (used by cell typing + A1/A2/A3). Alternative:
# train scGLUE a second time with treat_sample_as_batch=True; that run's
# embedding is merged in as X_glue_harmony and the Harmony pass auto-skips.
multiomics_harmonize_xglue_max_iter: 50
multiomics_run_glue_twice_for_sample_removal: false
multiomics_save_prefix: "glue"

# scGLUE throughput knobs (lifts the library default 128→1024 to saturate GPU;
# null max_epochs lets scGLUE pick adaptively — patience-based early stop
# usually fires well before any cap regardless).
multiomics_glue_data_batch_size: 1024
multiomics_glue_max_epochs: null
multiomics_glue_dataloader_num_workers: 4
multiomics_glue_dataloader_fetches_per_worker: 8
multiomics_glue_array_shuffle_num_workers: 4
multiomics_glue_graph_shuffle_num_workers: 4

multiomics_k_neighbors: 1
multiomics_use_rep: "X_glue"
multiomics_metric: "cosine"

multiomics_existing_cell_types: false
multiomics_n_target_clusters: 10
multiomics_cluster_resolution: 0.8
# null → auto-resolve to X_glue_harmony (sample-removed) if present, else X_glue
multiomics_use_rep_celltype: null
multiomics_markers: null
multiomics_generate_umap_celltype: true

multiomics_plot_columns: null

multiomics_min_cells_sample: 1
multiomics_min_cell_gene: 10
multiomics_min_features: 500
multiomics_pct_mito_cutoff: 20
multiomics_exclude_genes: null
multiomics_doublet: true

# Slim integrated h5ad: drop X / layers / varm. Off by default —
# embedding-only is all SE / cell typing / distance / trajectory needs.
# Set true to keep expression for downstream differential analysis.
multiomics_keep_expression: false

multiomics_derive_sample_embedding: false
multiomics_sample_embedding_medium_K: 120
multiomics_sample_embedding_fine_K: 300
multiomics_sample_embedding_cmd_dim: 8
multiomics_sample_embedding_use_clr: false
multiomics_sample_embedding_use_cmd: true
multiomics_sample_embedding_block_weights: null
