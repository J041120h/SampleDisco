# =============================================================================
# MAIN CONFIGURATION  --  Tabula Sapiens 51-sample RNA run
# =============================================================================
# Subset built at: /dcs07/hongkai/data/harry/result/Tabula/subset/
#   417,958 cells x 58,870 genes; 51 samples = donor x organ_tissue;
#   12 donors, 20 tissues, 167 fine cell_ontology_class types.
# obs cols already present: sample_id, donor, organ_tissue, compartment,
#   cell_type (=cell_ontology_class), free_annotation, gender, method,
#   n_counts_UMIs, n_genes.

output_dir: "/dcs07/hongkai/data/harry/result/Tabula/sampledisco_run"

# Pipeline selection
run_rna_pipeline: true
run_atac_pipeline: false
run_multiomics_pipeline: false

# General settings
use_gpu: true
initialization: false               # do NOT pip-install rapids or wipe result dirs
verbose: true
save_intermediate: true
large_data_need_extra_memory: true   # UVM: GPU pool spills to host RAM (200 GB Slurm cap, so plenty of headroom)

# =============================================================================
# RNA PIPELINE PARAMETERS
# =============================================================================

# --- Input/Output Paths ---
rna_count_data_path: "/dcs07/hongkai/data/harry/result/Tabula/subset/TabulaSapiens_55min2donor_raw.h5ad"
rna_output_dir: null                # -> {output_dir}/rna

# --- Pipeline Control Flags ---
# Restore-only: regenerate umap_cell_type.png and kmeans_sample_embedding.png
# at their ORIGINAL dot sizes (source code reverted). Skip visualize_data so
# the 6 PNGs in rna/visualization/ keep their 3x dots from the prior re-render.
rna_preprocessing: false
rna_cell_type_cluster: true
rna_derive_sample_embedding: false
rna_sample_distance_calculation: false
rna_trajectory_analysis: false
rna_trajectory_dge: false
rna_sample_cluster: true
rna_proportion_test: false
rna_cluster_dge: false
rna_visualize_data: false
rna_phenotype_prediction: false
rna_dimension_association_analysis: false

# --- Resume Paths (for skipping preprocessing) ---
rna_adata_cell_path: "/dcs07/hongkai/data/harry/result/Tabula/sampledisco_run/rna/preprocess/adata_preprocessed.h5ad"
rna_adata_sample_path: null
rna_sample_meta_path: null          # sample-level cols are already in adata.obs
rna_cell_meta_path: null
rna_pseudo_adata_path: null

# --- Common Column Names ---
rna_sample_col: "sample_id"
rna_sample_level_batch_col: null    # donor is at cell level only
rna_celltype_col: "cell_type"       # will be overwritten by Leiden clusters

# --- Preprocessing Parameters ---
rna_min_cells: 500                  # gene filter (genes detected in >= 500 cells)
rna_min_genes: 500                  # cell filter (>= 500 genes per cell)
rna_pct_mito_cutoff: 20.0
rna_exclude_genes: null
rna_num_cell_hvgs: 2000
rna_cell_embedding_num_pcs: 20
rna_num_harmony_iterations: 30
rna_cell_level_batch_key:
  - "donor"                         # cell-level batch correction by donor

# --- Cell Type Clustering Parameters (Re-cluster with Leiden) ---
rna_leiden_cluster_resolution: 0.8
rna_cell_embedding_column: null
rna_existing_cell_types: true       # viz-only rerun: use cached Leiden labels
rna_n_target_cell_clusters: null
rna_umap: true                      # needed for cell-type UMAP visualization

# --- Sample Embedding Parameters (composition + CMD) ---
rna_sample_embedding_medium_K: 120
rna_sample_embedding_fine_K: 300
rna_sample_embedding_cmd_dim: 8
rna_sample_embedding_use_clr: false
rna_sample_embedding_use_cmd: true
rna_sample_embedding_block_weights: null   # null -> inverse-variance auto-derive
rna_sample_embedding_cmd_weight: 0.60
rna_sample_embedding_pca_components: 10
rna_sample_embedding_batch_method: "harmony"

# --- Autotune Parameters (disabled) ---
rna_autotune_enable: false
rna_autotune_search: "bayesian"
rna_autotune_scoring: "auto"
rna_autotune_scope: "alpha_only"
rna_autotune_alpha_bounds: [0.1, 10.0]
rna_autotune_grouping_col: null

# --- Trajectory Analysis Parameters (disabled but kept for schema) ---
rna_n_cca_pcs: 10
rna_trajectory_col: "sev.level"
rna_trajectory_supervised: false
rna_trajectory_visualization_label:
  - "organ_tissue"
rna_cca_pvalue: false
rna_tscan_origin: null
rna_tscan_n_clusters: 3
rna_tscan_pseudotime_mode: "rank"

# --- Sample Distance Parameters ---
rna_sample_distance_methods:
  - "cosine"
  - "correlation"
rna_grouping_columns:
  - "organ_tissue"
  - "donor"
  - "gender"
rna_summary_sample_csv_path: null

# --- Trajectory Differential Gene Analysis Parameters (disabled) ---
rna_fdr_threshold: 0.05
rna_effect_size_threshold: 1.0
rna_top_n_genes: 100
rna_trajectory_diff_gene_covariate: null
rna_num_splines: 5
rna_spline_order: 2
rna_visualization_gene_list: null

# --- Sample Clustering Parameters ---
rna_cluster_number: 8               # 51 samples -> 8 clusters; coarser than 20-tissue
rna_cluster_differential_gene_group_col: null

# --- Visualization Parameters ---
rna_age_bin_size: null
rna_age_column: "age"               # absent in Tabula; viz will skip if missing
rna_plot_dendrogram_flag: true
rna_plot_cell_type_proportions_pca_flag: true
rna_plot_cell_type_expression_umap_flag: true

# --- Phenotype Prediction Parameters (disabled) ---
rna_prediction_target_col: null
rna_prediction_feature_source: "expression"
rna_prediction_task_type: "auto"
rna_prediction_cv: "auto"
rna_prediction_n_permutations: 0

# --- Dimension Association Analysis Parameters ---
# Leave both lists null -> auto-classify all sample-level obs columns
# (organ_tissue, donor, gender, etc.) into continuous/categorical and test.
rna_association_continuous_cols: null
rna_association_categorical_cols: null
rna_association_n_permutations: 999

