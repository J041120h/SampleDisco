# =============================================================================
# MAIN CONFIGURATION — Allen Immune Health Atlas (AIFI)
#
# Dataset:  /dcs07/hongkai/data/harry/result/human_immune_health/
#           human_immune_health_atlas_full.h5ad  (40 GB, 1,821,725 × 1,236)
# Subjects: 108 healthy donors, 1 PBMC sample each, single-omics scRNA.
# Cohorts:  BR1 (47, Young Adult) / BR2 (45, Older Adult) / UP1 (16, Children).
# Cohort = ageGroup = visitName are perfectly collinear; sex (59F/49M) and CMV
# (63N/45P) are balanced across cohorts. CMD-relevant biology is well-documented
# in AIFI's paper (T-cell aging programs, CMV-expanded EM CD8 / adaptive NK).
#
# AIFI's pre-computed X_pca_harmony, X / HVG slice, and X_umap are intentionally
# NOT used. Input is a prep-step h5ad with .X = raw counts from the original
# .raw.X (33,538 genes, sparse uint16) — see comment under rna_count_data_path.
# Cell-type annotation reuses AIFI_L1 (9 expert-curated PBMC types) so we don't
# re-cluster a well-annotated atlas.
# =============================================================================

output_dir: "/dcs07/hongkai/data/harry/result/human_immune_health/sample_disco"

# Pipeline selection
run_rna_pipeline: true
run_atac_pipeline: false
run_multiomics_pipeline: false

# General settings
# Note: this node's cupy/rapids are built for a newer CUDA than the V100S
# driver (12.5) exposes — preprocess_gpu fails to import. Force CPU; the
# package's wrapper would fall back anyway but explicit avoids the rapids
# pip-install attempt during initialization.
use_gpu: false
initialization: true
verbose: true
save_intermediate: true
large_data_need_extra_memory: false

# =============================================================================
# RNA PIPELINE PARAMETERS
# =============================================================================

# --- Input/Output Paths ---
# Input is the prepped h5ad written by:
#   /dcs07/hongkai/data/harry/result/human_immune_health/sample_disco_input/
#     prepare_aifi_for_sampledisco.py
# which moves .raw.X (raw counts, 33,538 genes) into .X, keeps all 94 obs cols
# (incl. AIFI_L1/L2/L3 and the 62 appended clinical-lab columns), and drops
# AIFI's pre-computed obsm (X_pca, X_pca_harmony, X_umap) so SampleDisco runs
# its own preprocessing from scratch.
rna_count_data_path: "/dcs07/hongkai/data/harry/result/human_immune_health/sample_disco_input/aifi_raw_for_sampledisco.h5ad"
rna_output_dir: null                   # → {output_dir}/rna

# --- Pipeline Control Flags ---
# The package's preprocess() OOMs at 50 GB SLURM on this atlas (multiple
# .copy() ops each briefly hold two 24 GB CSR copies). Instead we run a
# memory-efficient custom_preprocess.py beforehand that writes a file
# matching the package's expected schema to {rna_output_dir}/preprocess/
# adata_preprocessed.h5ad, then set rna_preprocessing=false so the
# wrapper picks it up from disk. Same for rna_cell_type_cluster: we don't
# need leiden (AIFI_L1 is used as celltype_col directly), so skipping
# avoids the 1.8 M-cell sc.pp.neighbors call.
rna_preprocessing: false
rna_cell_type_cluster: false
rna_derive_sample_embedding: true
rna_sample_distance_calculation: false # decide after seeing the embedding
rna_trajectory_analysis: false         # no trajectory axis in this dataset
rna_trajectory_dge: false
rna_sample_cluster: false              # decide after seeing the embedding
rna_proportion_test: false
rna_cluster_dge: false
rna_visualize_data: false              # cell-level UMAP comes from cell_types step; skip extras
rna_dimension_association_analysis: true   # the key step

# --- Resume Paths ---
rna_adata_cell_path: null
rna_adata_sample_path: null
rna_sample_meta_path: null             # all metadata already in obs
rna_cell_meta_path: null
rna_pseudo_adata_path: null

# --- Common Column Names ---
rna_sample_col: "sample.sampleKitGuid" # 108 unique; canonical join key
rna_sample_level_batch_col:            # used by CMD per-group LOO reference
  - "batch_id"
rna_celltype_col: "AIFI_L1"            # 9 expert-curated PBMC types

# --- Preprocessing Parameters ---
rna_min_cells: 500                     # gene present in ≥500 cells; smallest AIFI sample 6,632 cells
rna_min_genes: 500                     # cell with ≥500 detected genes; trims AIFI's bottom ~3%
rna_pct_mito_cutoff: 20.0              # AIFI max mito% is 9.998 → no rows filtered
rna_exclude_genes: null
rna_num_cell_hvgs: 2000                # matches all other configs (covid, blood, long-covid)
rna_cell_embedding_num_pcs: 20
rna_num_harmony_iterations: 30
rna_cell_level_batch_key:              # Pass 2 (sample-preserved Z_cmd) batch keys
  - "batch_id"                         # Pass 1 (Z_clust) auto-appends sample col

# --- Cell Type Clustering Parameters ---
rna_leiden_cluster_resolution: 0.8     # unused because existing_cell_types=true
rna_cell_embedding_column: null        # → "Z_clust"
rna_existing_cell_types: true          # use AIFI_L1 directly
rna_n_target_cell_clusters: null       # keep all 9
rna_umap: true                         # cell-level UMAP for inspection

# --- Sample Embedding Parameters (composition + CMD) ---
rna_sample_embedding_medium_K: 120
rna_sample_embedding_fine_K: 300
rna_sample_embedding_cmd_dim: 8
rna_sample_embedding_use_clr: false
rna_sample_embedding_use_cmd: true
rna_sample_embedding_block_weights: null   # null → inverse-variance auto-derive
rna_sample_embedding_cmd_weight: 0.60
rna_sample_embedding_pca_components: 10
rna_sample_embedding_batch_method: "harmony"

# --- Autotune Parameters ---
rna_autotune_enable: false             # default α=0.6 first pass; consider tuning in pass 2
rna_autotune_search: "bayesian"
rna_autotune_scoring: "auto"
rna_autotune_scope: "alpha_only"
rna_autotune_alpha_bounds: [0.1, 10.0]
rna_autotune_grouping_col: null

# --- Trajectory Analysis Parameters (unused) ---
rna_n_cca_pcs: 10
rna_trajectory_col: "sev.level"
rna_trajectory_supervised: false
rna_trajectory_visualization_label:
  - "sev.level"
rna_cca_pvalue: false
rna_tscan_origin: null
rna_tscan_n_clusters: null
rna_tscan_pseudotime_mode: "rank"

# --- Sample Distance Parameters (unused) ---
rna_sample_distance_methods:
  - "cosine"
  - "correlation"
rna_grouping_columns:
  - "subject.ageGroup"
rna_summary_sample_csv_path: null

# --- Trajectory DGE Parameters (unused) ---
rna_fdr_threshold: 0.05
rna_effect_size_threshold: 1.0
rna_top_n_genes: 100
rna_trajectory_diff_gene_covariate: null
rna_num_splines: 5
rna_spline_order: 3
rna_visualization_gene_list: null

# --- Sample Clustering Parameters (unused) ---
rna_cluster_number: 3
rna_cluster_differential_gene_group_col: "subject.ageGroup"

# --- Visualization Parameters (unused) ---
rna_age_bin_size: null
rna_age_column: "subject.ageAtFirstDraw"
rna_plot_dendrogram_flag: true
rna_plot_cell_type_proportions_pca_flag: true
rna_plot_cell_type_expression_umap_flag: true

# --- Dimension Association Analysis Parameters ---
rna_association_continuous_cols: null  # auto-classified from obs by the module
rna_association_categorical_cols: null
rna_association_n_permutations: 999

