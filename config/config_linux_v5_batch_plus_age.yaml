# =============================================================================
# MAIN CONFIGURATION — Terekhova 2023 healthy-aging PBMC (Synapse syn49637038)
#
# Dataset: /dcs07/hongkai/data/harry/result/health_aging_PBMC/data/benchmark_ready/
#          pbmc_benchmark_ready.h5ad  (19 GB, 1,916,367 cells × 36,601 genes)
# Samples: 317 visits (Tube_id) from 166 donors (Donor_id), 1-3 visits/donor.
# Batches: 14 sequencing batches (Batch, AS044-AS062).
# Biology: continuous Age (25-81), Age_group A-E. All donors are healthy
#          (BMI<30, no inflammation/cancer). Sex 270M/47F.
# Confounding: sample-level R^2(Age ~ Batch one-hot) = 0.056 -> Age is NOT
#          nested in Batch. Each major batch holds samples from all 5 age groups.
# Raw counts: integer (max=4611), sparse CSR, float32+int32 encoded.
# Cell-type annotation: 9 broad PBMC clusters in obs.Cluster_names (matches
#          AIFI_L1 in cardinality); fine 55-subpopulation labels not in this
#          download.
# Expected biology to recover (paper Fig 1E, 7E-H): PC1 of sample embedding ~ Age;
#          with age: +Th2, +CD4 HLA-DR+ memory, +CD8 Tem GZMK+, +CD8 Tcm CCR4+,
#          +CD4/CD8 ratio; -CD8 Naive, -NKG2C+GZMB- Tmem.
#
# Pipeline scope: preprocess -> cell-type (reuse Cluster_names) -> sample
#                 embedding -> dimension-association. Distance / clustering /
#                 trajectory / DGE / proportion / visualization all disabled.
# =============================================================================

output_dir: "/dcs07/hongkai/data/harry/result/health_aging_PBMC/round5_batch_age"

# Pipeline selection
run_rna_pipeline: true
run_atac_pipeline: false
run_multiomics_pipeline: false

# General settings
# GPU requested per user choice. V100S 32 GB + driver CUDA 12.5; if the rapids
# build mismatches the driver (as it did on the AIFI node), preprocess_gpu
# will fail at import and the wrapper falls back to CPU.
use_gpu: true
initialization: false
verbose: true
save_intermediate: true
# True -> CuPy managed/unified memory: working set can exceed 32 GB by spilling
# to host (slower but won't OOM). Recommended given 1.92M cells x 2000 HVGs.
large_data_need_extra_memory: true

# =============================================================================
# RNA PIPELINE PARAMETERS
# =============================================================================

# --- Input/Output Paths ---
rna_count_data_path: "/dcs07/hongkai/data/harry/result/health_aging_PBMC/data/benchmark_ready/pbmc_benchmark_ready.h5ad"
rna_output_dir: "/dcs07/hongkai/data/harry/result/health_aging_PBMC/round5_batch_age/sample_embedding"

# --- Pipeline Control Flags ---
# Per user: try the package's standard preprocess (Option A). 745 GB RAM on
# this node should accommodate transient .copy() ops on a 19 GB float32 CSR.
# If it still OOMs, stop and ask (do NOT silently switch to a custom prep).
rna_preprocessing: false
rna_cell_type_cluster: false
rna_derive_sample_embedding: true
rna_sample_distance_calculation: false # decide after seeing embedding
rna_trajectory_analysis: false
rna_trajectory_dge: false
rna_sample_cluster: false              # decide after seeing embedding
rna_proportion_test: false
rna_cluster_dge: false
rna_visualize_data: false              # cell-level UMAP comes from cell_types step
rna_dimension_association_analysis: true   # post-embedding R^2 of Age vs dims

# --- Resume Paths ---
rna_adata_cell_path: "/dcs07/hongkai/data/harry/result/health_aging_PBMC/round1_batch/preprocess/adata_preprocessed.h5ad"
rna_adata_sample_path: null
rna_sample_meta_path: null             # all metadata already in obs
rna_cell_meta_path: null
rna_pseudo_adata_path: null

# --- Common Column Names ---
rna_sample_col: "Tube_id"              # 317 visits (paper's sample unit)
rna_sample_level_batch_col:
  - "Batch_AgeGroup"                   # Batch x Age_group combined (59 strata) - regress out both via single-key wrapper
rna_celltype_col: "Cluster_names"      # 9 broad PBMC types

# --- Preprocessing Parameters ---
rna_min_cells: 500                     # gene present in >=500 cells (500/1.92M = 0.026%)
rna_min_genes: 500                     # cell with >=500 detected genes
rna_pct_mito_cutoff: 20.0
rna_exclude_genes: null
rna_num_cell_hvgs: 2000                # matches AIFI / covid / blood / long-covid
rna_cell_embedding_num_pcs: 20
rna_num_harmony_iterations: 30
rna_cell_level_batch_key:              # Pass 2 (sample-preserved Z_cmd) batch keys
  - "Batch"                            # Pass 1 (Z_clust) auto-appends sample col

# --- Cell Type Clustering Parameters ---
rna_leiden_cluster_resolution: 0.8     # unused (existing_cell_types=true)
rna_cell_embedding_column: null        # -> "Z_clust"
rna_existing_cell_types: true          # use Cluster_names directly
rna_n_target_cell_clusters: null       # keep all 9
rna_umap: true                         # cell-level UMAP for inspection

# --- Sample Embedding Parameters (composition + CMD) ---
rna_sample_embedding_medium_K: 120
rna_sample_embedding_fine_K: 300
rna_sample_embedding_cmd_dim: 8
rna_sample_embedding_use_clr: false
rna_sample_embedding_use_cmd: true
rna_sample_embedding_block_weights: null   # inverse-variance auto-derive
rna_sample_embedding_cmd_weight: 5.05    # round1 autotune optimum (skip retune)
rna_sample_embedding_pca_components: 10
rna_sample_embedding_batch_method: "harmony"

# --- Autotune Parameters ---
rna_autotune_enable: false   # skip retune — use round1 alpha=5.05 (only changed batch col)
rna_autotune_search: "bayesian"
rna_autotune_scoring: "auto"
rna_autotune_scope: "alpha_only"
rna_autotune_alpha_bounds: [0.1, 10.0]
rna_autotune_grouping_col: "Age"

# --- Trajectory Analysis Parameters (unused) ---
rna_n_cca_pcs: 10
rna_trajectory_col: "Age"
rna_trajectory_supervised: false
rna_trajectory_visualization_label:
  - "Age"
rna_cca_pvalue: false
rna_tscan_origin: null
rna_tscan_n_clusters: null
rna_tscan_pseudotime_mode: "rank"

# --- Sample Distance Parameters (unused) ---
rna_sample_distance_methods:
  - "cosine"
  - "correlation"
rna_grouping_columns:
  - "Age_group"
rna_summary_sample_csv_path: null

# --- Trajectory DGE Parameters (unused) ---
rna_fdr_threshold: 0.05
rna_effect_size_threshold: 1.0
rna_top_n_genes: 100
rna_trajectory_diff_gene_covariate: null
rna_num_splines: 5
rna_spline_order: 3
rna_visualization_gene_list: null

# --- Sample Clustering Parameters (unused) ---
rna_cluster_number: 5                  # would map to Age_group A-E if used
rna_cluster_differential_gene_group_col: "Age_group"

# --- Visualization Parameters (unused) ---
rna_age_bin_size: null
rna_age_column: "Age"
rna_plot_dendrogram_flag: true
rna_plot_cell_type_proportions_pca_flag: true
rna_plot_cell_type_expression_umap_flag: true

# --- Dimension Association Analysis Parameters ---
rna_association_continuous_cols: null  # auto-classified from obs
rna_association_categorical_cols: null
rna_association_n_permutations: 999

